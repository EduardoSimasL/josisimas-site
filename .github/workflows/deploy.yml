name: Deploy (FTP)

# Faz build do site estático e envia o conteúdo de /out por FTP a cada push na main.
# Credenciais e host ficam em GitHub Secrets (FTP_SERVER, FTP_USERNAME, FTP_PASSWORD).
on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pela aba Actions

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build (Next.js static export → /out)
        run: npm run build

      - name: Garantir .htaccess no build
        # O Next copia public/ para out/, mas garantimos o dotfile por segurança.
        run: cp public/.htaccess out/.htaccess || true

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # Pasta pública do servidor (ajuste conforme a hospedagem).
          server-dir: public_html/
          # Mantém o .git e arquivos de controle fora do servidor
          exclude: |
            **/.git*
            **/.git*/**
